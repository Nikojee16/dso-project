apiVersion: v1
kind: ServiceAccount
metadata:
  name: dso-demo-api-sa
  namespace: dso-demo-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dso-demo-api-role
  namespace: dso-demo-app
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dso-demo-api-rolebinding
  namespace: dso-demo-app
subjects:
  - kind: ServiceAccount
    name: dso-demo-api-sa
    namespace: dso-demo-app
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: dso-demo-api-role
